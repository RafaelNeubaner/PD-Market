<!doctype html>
<!-- define o documento como html5 -->
<html lang="pt-BR">
  <!-- define o idioma como português do Brasil -->
  <head>
    <!-- cabeçalho do documento onde sero definidos os metadados e titulo -->
    <meta charset="UTF-8" />
    <!-- define a codificação de caracteres como UTF-8 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="styles.css" />
    <!-- link para o arquivo de estilos CSS -->
    <link rel="stylesheet" href="carrinho.css" />
    <!-- link para o arquivo de estilos CSS do carrinho -->
    <link rel="icon" href="assets/logo.png" />
    <!-- define o ícone da aba do navegador -->
    <title>PD Market | Home</title>
    <!-- define o título da página -->
    <base href="./" target="_self" />
    <!-- define o diretório base para links relativos -->
    <script defer src="scripts.js"></script>
    <script defer src="carrinho.js"></script>
  </head>
  <body>
    <!-- corpo do documento onde o conteúdo visível é inserido -->
    <header>
      <!-- cabeçalho da página -->
      <img
        src="assets/logo.png"
        usemap="#logo-map"
        alt="Logo da PD Market"
        id="logo"
      />
      <!-- link para a página inicial com a logo -->
      <map name="logo-map">
        <area shape="rect" coords="0,0,100,100" href="index.html" alt="Home" />
      </map>

      <form class="search-container" role="search">
        <!-- formulário de busca -->

        <input type="checkbox" id="search-trigger" class="search-checkbox" />
        <!-- checkbox para ativar/desativar a busca -->

        <label for="search-trigger" class="search-icon">
          <!-- rótulo para o checkbox com ícone de busca -->
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
            style="width: 45px; height: 45px"
          >
            <!-- ícone de lupa para busca -->
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"
            />
          </svg>
        </label>

        <input
          type="search"
          class="search-input"
          placeholder="Buscar produto..."
        />
      </form>

      <nav>
        <!-- navbar principal -->
        <ul>
          <!-- lista de links de navegação -->
          <li><a href="index.html">Home</a></li>
          <li><a href="mercado.html">Comprar</a></li>
          <li><a href="sobre.html">Sobre nós</a></li>
          <li><a href="contato.html">Contato</a></li>
        </ul>
      </nav>
      <a href="carrinho.html" class="carrinho-container">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="1.5"
          stroke="currentColor"
          class="icon-cart"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 00-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684 2.924-7.138a60.114 60.114 0 00-16.536-1.84M7.5 14.25L5.106 5.272M6 20.25a.75.75 0 11-1.5 0 .75.75 0 011.5 0zm12.75 0a.75.75 0 11-1.5 0 .75.75 0 011.5 0z"
          />
        </svg>

        <span class="badge cart-badge">3</span>
      </a>
    </header>
    <main id="carrinho">
      <h1>Carrinho de Compras</h1>
      <p class="carrinho-vazio">Seu carrinho está vazio.</p>
      <div class="content-wrap"></div>
      <div class="resumo">
        <h4>Subtotal: <span class="span2">R$ 8,97</span></h4>
        <button class="finalizar">Finalizar Compra</button>
      </div>
    </main>
  </body>
</html>
